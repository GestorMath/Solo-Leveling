<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Offline — Projeto S</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: crosshair;
    }

    /* Grid de fundo */
    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Scanline */
    .scanline {
      position: fixed;
      top: -2%;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(0, 255, 255, 0.08);
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.12);
      animation: scanline 10s linear infinite;
      pointer-events: none;
      z-index: 999;
    }

    @keyframes scanline {
      0%   { top: -2%; opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { top: 102%; opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
    }

    /* Logo hexágono */
    .logo {
      margin-bottom: 2rem;
      animation: hexPulse 2s ease-in-out infinite;
    }

    @keyframes hexPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .status {
      font-size: 9px;
      color: #475569;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(0, 255, 255, 0.8);
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
      margin-bottom: 1rem;
      animation: titleGlow 3s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(0,255,255,0.3); }
      50%       { text-shadow: 0 0 50px rgba(0,255,255,0.8); }
    }

    .message {
      font-size: 11px;
      color: #64748b;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .message span {
      color: #00ffff;
      font-weight: bold;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,255,0.3), transparent);
      margin: 1.5rem 0;
    }

    /* Indicadores de status */
    .indicators {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 2rem;
    }

    .indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: #334155;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.red    { background: #ef4444; animation: blink 1s ease-in-out infinite; }
    .dot.yellow { background: #eab308; animation: blink 1.5s ease-in-out infinite; }
    .dot.green  { background: #22c55e; animation: blink 2s ease-in-out infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* Botão retry */
    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border: 1px solid rgba(0, 255, 255, 0.5);
      background: rgba(0, 255, 255, 0.08);
      color: #00ffff;
      font-family: inherit;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-retry:hover {
      background: rgba(0, 255, 255, 0.18);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }

    .btn-retry:active {
      transform: scale(0.97);
    }

    /* Partículas */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      bottom: -10px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(147, 51, 234, 0.6);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(0) scale(1); opacity: 0.6; }
      100% { transform: translateY(-100vh) scale(0); opacity: 0; }
    }

    .footer-text {
      margin-top: 2rem;
      font-size: 8px;
      color: #1e293b;
      text-transform: uppercase;
      letter-spacing: 0.3em;
    }
  </style>
</head>
<body>

  <div class="grid"></div>
  <div class="scanline"></div>

  <!-- Partículas -->
  <div class="particles" id="particles"></div>

  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <svg width="72" height="62" viewBox="0 0 72 62" xmlns="http://www.w3.org/2000/svg">
        <polygon
          points="36,4 64,20 64,44 36,60 8,44 8,20"
          fill="none"
          stroke="rgba(0,255,255,0.7)"
          stroke-width="1.5"
        />
        <text
          x="36" y="38"
          text-anchor="middle"
          fill="rgba(0,255,255,0.8)"
          font-size="20"
          font-weight="bold"
          font-family="Courier New, monospace"
        >S</text>
      </svg>
    </div>

    <p class="status">// Sistema de Evolução — Projeto S</p>

    <h1>Sem Conexão</h1>

    <p class="message">
      O sistema está <span>offline</span>.<br/>
      Sua jornada não para — verifique sua<br/>
      conexão e tente novamente.
    </p>

    <div class="divider"></div>

    <!-- Status do sistema -->
    <div class="indicators">
      <div class="indicator">
        <div class="dot red"></div>
        <span>Conexão com servidor — offline</span>
      </div>
      <div class="indicator">
        <div class="dot yellow"></div>
        <span>Dados locais — preservados</span>
      </div>
      <div class="indicator">
        <div class="dot green"></div>
        <span>Cache do app — ativo</span>
      </div>
    </div>

    <a href="/" class="btn-retry" onclick="window.location.reload(); return false;">
      ↺ Tentar Novamente
    </a>

    <p class="footer-text">Projeto S · Sistema de Evolução Pessoal</p>

  </div>

  <script>
    // Gerar partículas flutuantes
    const container = document.getElementById('particles')
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div')
      p.className = 'particle'
      p.style.left     = `${10 + Math.random() * 80}%`
      p.style.animationDuration  = `${4 + Math.random() * 6}s`
      p.style.animationDelay     = `${Math.random() * 4}s`
      p.style.width  = `${3 + Math.random() * 4}px`
      p.style.height = p.style.width
      container.appendChild(p)
    }

    // Auto-retry quando conexão voltar
    window.addEventListener('online', () => {
      window.location.reload()
    })
  </script>

</body>
</html>
